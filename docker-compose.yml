services:
  gas_app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gas_control_app
    ports:
      - "8090:5173"
    volumes:
      - .:/app
      - gas_node_modules:/app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    stdin_open: true
    tty: true

volumes:
  gas_node_modules: