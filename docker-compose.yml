services:
  gas_app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gas_control_app
    ports:
      - "8090:5173"
      - "8092:3001"
    volumes:
      - .:/app
      - gas_node_modules:/app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - API_PORT=3001
      - DB_CONNECTION=mysql
      - DB_HOST=infra-mysql-1
      - DB_PORT=3306
      - DB_DATABASE=controlegasabs
      - DB_USERNAME=admin
      - DB_PASSWORD=admin
    networks:
      - default
      - shared
    stdin_open: true
    tty: true

volumes:
  gas_node_modules:

networks:
  shared:
    external: true
    name: shared_net
